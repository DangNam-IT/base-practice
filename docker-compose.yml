services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: secure_task_manager_db2
    env_file:
      - .env
    environment:
      POSTGRES_USER: bookstore_user
      POSTGRES_PASSWORD: bookstore_pass
      POSTGRES_DB: library_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore_user -d library_management"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - secure_network

  # FastAPI Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure_task_manager_app2
    environment:
      DATABASE_URL: postgresql://bookstore_user:bookstore_pass@db:5432/library_management
      DATABASE_URL_SYNC: postgresql://bookstore_user:bookstore_pass@db:5432/library_management
      SECRET_KEY: fallback-secret-key-change-me
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      DEBUG: "True"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - secure_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

networks:
  secure_network:
    driver: bridge
